name: Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git Tag to create. Usage in Image and GH Release"
        required: true
jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6.19.2
        with:
          context: ${{ github.workspace }}/
          file: ${{ github.workspace }}/Containerfile
          tags: |
            ghcr.io/${{ github.repository }}/dashboard:latest
            ghcr.io/${{ github.repository }}/dashboard:${{ github.event.inputs.tag }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/dashboard:latest
          cache-to: type=inline
          platforms: linux/amd64,linux/arm64
          push: true

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - build-images
    permissions:
      packages: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update Kubernetes manifest
        run: |
          export IMAGE="ghcr.io/procinger/tuppr-dashboard/dashboard:${{ github.event.inputs.tag }}"
          yq -i '.spec.template.spec.containers[] |=
          select(.name == "dashboard").image = strenv(IMAGE)' manifest/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add manifest/deployment.yaml
          git commit -m "chore: update image to ${{ github.event.inputs.tag }}" || exit 0
          git push

      - name: Create Git Tag
        run: |
          git tag ${{ github.event.inputs.tag }}
          git push origin ${{ github.event.inputs.tag }}

      - name: Create Github Release
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            manifest/deployment.yaml
